<body class="bg-warm-cream min-h-screen flex items-center justify-center font-body-md text-on-surface p-6 overflow-x-hidden relative">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 bg-texture pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[60%] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[60%] rounded-full bg-secondary/5 blur-[120px] pointer-events-none"></div>
<main class="relative z-10 w-full max-w-md">
<!-- Logo Branding -->
<div class="text-center mb-stack-lg">
<h1 class="text-forest-olive font-headline-lg text-headline-lg tracking-tight mb-stack-sm">Amrutam</h1>
<p class="text-on-surface-variant font-body-md text-body-md opacity-80">Ancient Wisdom, Clinical Precision.</p>
</div>
<!-- Login Card -->
<div class="bg-soft-beige border border-sand/30 rounded-xl p-8 custom-shadow backdrop-blur-sm">
<!-- Role Selection Tabs -->
<div class="flex items-center justify-between p-1 bg-surface-container-low rounded-lg mb-stack-lg relative overflow-hidden">
<div class="absolute top-1 left-1 h-[calc(100%-8px)] w-[32%] bg-white rounded-md shadow-sm transition-all duration-300 ease-out" id="tab-indicator"></div>
<button class="relative z-10 flex-1 py-2 font-label-md text-label-md text-forest-olive transition-colors role-tab" id="tab-patient" onclick="switchRole('patient', 0)">
                    Patient
                </button>
<button class="relative z-10 flex-1 py-2 font-label-md text-label-md text-on-surface-variant transition-colors role-tab" id="tab-doctor" onclick="switchRole('doctor', 1)">
                    Doctor
                </button>
<button class="relative z-10 flex-1 py-2 font-label-md text-label-md text-on-surface-variant transition-colors role-tab" id="tab-admin" onclick="switchRole('admin', 2)">
                    Admin
                </button>
</div>
<!-- Login Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-forest-olive ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/50 border-b-2 border-transparent focus:border-primary border-sand/20 rounded-t-lg outline-none transition-all placeholder:text-outline-variant font-body-md text-body-md" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-forest-olive" for="password">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-white/50 border-b-2 border-transparent focus:border-primary border-sand/20 rounded-t-lg outline-none transition-all placeholder:text-outline-variant font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline transition-colors" onclick="togglePassword()" type="button">visibility</button>
</div>
</div>
<div class="flex items-center space-x-2 px-1 pt-1">
<input class="w-4 h-4 rounded border-sand text-primary focus:ring-primary/20 bg-white/50" id="remember" type="checkbox"/>
<label class="text-label-sm font-label-sm text-on-surface-variant cursor-pointer" for="remember">Remember me on this device</label>
</div>
<button class="w-full bg-forest-olive hover:bg-primary text-off-white font-label-md text-label-md py-4 rounded-lg shadow-lg hover:shadow-primary/20 transition-all duration-300 active:scale-[0.98] mt-stack-md flex items-center justify-center space-x-2" type="submit">
<span>Sign In to Dashboard</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-stack-lg pt-stack-lg border-t border-sand/20 text-center">
<p class="text-body-md font-body-md text-on-surface-variant mb-stack-md">Or continue with</p>
<div class="flex space-x-gutter">
<button class="flex-1 flex items-center justify-center py-2.5 px-4 bg-white/60 border border-sand/30 rounded-lg hover:bg-white transition-all group">
<div class="w-5 h-5 mr-2" data-alt="A clean, flat-design icon of the Google logo with its characteristic red, yellow, green, and blue colors, placed on a transparent background to emphasize a minimalist healthcare UI aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAaqR2Op7jCnoyGcP3RPK8_BZP-CuodjTnspSjIYf5Iz5Yt9UFHG7JGE6pzELZzAaBwh6Y8SbzfqjOM2_WIa2k2XSJDPuQhcGG3xL3jhzu2kojJYWWSj7j-MjkqQskYTL3nZfWs-1N8rSQ6W2CTox-F-hWOhDKSAh8fx43j8gvk-zo-MgKCoA4E4PPT4DFDYuHe-OrZ4U5MoOqjkNQvivCfKb7Jx3CcTH4k5JRJjl67FwjPArM6fpAhhA')"></div>
<span class="text-label-sm font-label-sm text-forest-olive">Google</span>
</button>
<button class="flex-1 flex items-center justify-center py-2.5 px-4 bg-white/60 border border-sand/30 rounded-lg hover:bg-white transition-all group">
<span class="material-symbols-outlined mr-2 text-outline group-hover:text-primary">fingerprint</span>
<span class="text-label-sm font-label-sm text-forest-olive">Biometrics</span>
</button>
</div>
</div>
</div>
<!-- Secondary Footer Links -->
<div class="mt-stack-lg text-center">
<p class="text-on-surface-variant font-body-md text-body-md">
                Don't have an account? <a class="text-secondary font-semibold hover:underline" href="#">Request Access</a>
</p>
<div class="mt-stack-md flex items-center justify-center space-x-gutter opacity-60">
<a class="text-label-sm font-label-sm hover:text-forest-olive transition-colors" href="#">Privacy</a>
<span class="text-outline-variant">•</span>
<a class="text-label-sm font-label-sm hover:text-forest-olive transition-colors" href="#">Terms</a>
<span class="text-outline-variant">•</span>
<a class="text-label-sm font-label-sm hover:text-forest-olive transition-colors" href="#">Support</a>
</div>
</div>

<div class="hidden xl:flex fixed right-margin-desktop top-1/2 -translate-y-1/2 w-80 flex-col space-y-gutter pointer-events-none">
<div class="h-64 w-full rounded-2xl border border-sand/30 overflow-hidden relative group custom-shadow">
<div class="absolute inset-0" data-alt="A serene, high-end macro photograph of a drop of herbal oil falling onto a pristine green leaf, captured with shallow depth of field and soft, natural clinical lighting. The aesthetic is clean, premium, and restorative, using tones of deep forest green and warm cream." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAqqUGUtr7BbENuIp-sfEkmT0jMGVPvvGkFiH84VNGqmWqpNlw5o6N8ye-EqiyFG1IWJsNT4AwGUcgClXhFwKJBWgQ1EfUYAadeYLvC7DgwSlRXO-hxiCMzlfw3SIxibOtLBqmOzNUQBfmv2C6tr0Cq5TmGAL0jxfB6QfDUI7ytHvjR93acTSYF-ZvMJV5_prHXJ0ge9n1v01Uhzdz9f3lvWXUZTUOpJ6fpFm5E7YABSg9iJW3CSE9iWQ')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-forest-olive/60 to-transparent"></div>
<div class="absolute bottom-4 left-4 text-off-white">
<p class="font-label-sm text-label-sm opacity-80 uppercase tracking-widest">Holistic Care</p>
<h3 class="font-headline-md text-headline-md leading-tight">Rooted in Tradition</h3>
</div>
</div>
<div class="h-48 w-full rounded-2xl border border-sand/30 overflow-hidden relative group custom-shadow">
<div class="absolute inset-0" data-alt="A minimalist clinical scene showing a modern Ayurvedic practitioner's desk with a brass mortar and pestle next to a sleek, high-end tablet displaying a medical chart. High-key lighting and soft beige textures create a professional, trustworthy atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBa34PoeT5Err_IYE241vfLzg0lCD7rdX85udLzq3OW4z5o64nj4tFaL6Zmh_DUkKh1f0uGu7yhQ_w1ck7itVq7l8oo2btUS8G2oQBcucZUtqlTqDOhFO3LxzuercwuLWJ6OBYYhhUIi_wrOWeYB5FQPhCh9ixf7hXvRWdu5PRHl55UIVF_Sm3WyGByA1W1w_Z-lmbtg-XawdKFCIYDwYFZQjx9u7dGV0ShhyZzrTFUni0QuCwV-bW-xw')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-secondary/60 to-transparent"></div>
<div class="absolute bottom-4 left-4 text-off-white">
<p class="font-label-sm text-label-sm opacity-80 uppercase tracking-widest">Precision</p>
<h3 class="font-headline-md text-headline-md leading-tight">Data-Driven Health</h3>
</div>
</div>
</div>
<script>
        function switchRole(role, index) {
            const indicator = document.getElementById('tab-indicator');
            const tabs = document.querySelectorAll('.role-tab');
            
            // Move indicator
            indicator.style.left = `calc(${index * 32}% + 4px + ${index * 2}%)`;
            
            // Update text colors
            tabs.forEach(tab => {
                tab.classList.remove('text-forest-olive');
                tab.classList.add('text-on-surface-variant');
            });
            
            document.getElementById(`tab-${role}`).classList.remove('text-on-surface-variant');
            document.getElementById(`tab-${role}`).classList.add('text-forest-olive');

            // Optional: Transition effect for inputs or context changes
            console.log(`Role switched to: ${role}`);
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleBtn = event.currentTarget;
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleBtn.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                toggleBtn.innerText = 'visibility';
            }
        }
        
        // Initial call to set correct tab state
        switchRole('patient', 0);
    </script>
